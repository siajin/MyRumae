<script>
(function() {
    // URL이 /local/ubveluga/index.php?id= 로 시작하는 페이지에서만 실행
    if (window.location.pathname !== '/local/ubveluga/index.php' ||
        !window.location.search.includes('id=')) {
        return;
    }

    function addNotice() {
        // "강의실에 등록된 파일을 선택하여 AI 튜터에게 학습을 시킬 수 있습니다." 텍스트가 포함된 리스트 찾기
        var listItems = document.querySelectorAll('li');
        var targetUl = null;

        for (var i = 0; i < listItems.length; i++) {
            if (listItems[i].textContent.indexOf('강의실에 등록된 파일을 선택하여 AI 튜터에게 학습을 시킬 수 있습니다') !== -1) {
                targetUl = listItems[i].parentElement;
                break;
            }
        }

        if (!targetUl) {
            return;
        }

        // 이미 추가되었는지 확인 (중복 방지)
        if (document.getElementById('ai-tutor-notice')) {
            return;
        }

        // 새 안내 문구 요소 생성
        var notice = document.createElement('p');
        notice.id = 'ai-tutor-notice';
        notice.style.color = 'red';
        notice.style.fontWeight = 'bold';
        notice.style.margin = '0 0 10px 0';
        notice.textContent = 'AI 튜터는 학습된 파일만을 기반으로 채팅을 진행합니다. AI튜터를 이용하기 위해서는 담당교수자의 파일학습이 필수적입니다.';

        // 리스트(ul) 바로 앞에 삽입
        targetUl.parentNode.insertBefore(notice, targetUl);
    }

    // DOM 준비 후 실행
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', addNotice);
    } else {
        addNotice();
    }
})();
</script><script>
